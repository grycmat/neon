// Classes the Compose compiler should treat as stable even though it can't
// prove it on its own (List<...>/java.time.Instant fields defeat automatic
// inference). core/model is a pure Kotlin JVM module with no Compose
// dependency, so these can't be annotated with @Immutable/@Stable directly —
// see https://developer.android.com/develop/ui/compose/performance/stability/fix#configuration-file
//
// Every core/model class is a data class with val-only fields, mutated only
// via .copy() — genuinely immutable, just not provably so to the compiler.
com.gigapingu.neon.core.model.*

// Java standard library classes used inside those models.
java.time.Instant
